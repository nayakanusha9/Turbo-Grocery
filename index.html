<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Turbo Grocery</title>
<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div id="toast"></div>

<!-- NAVBAR -->
<div class="topnav">
    <div class="logo">⚡🛒 Turbo Grocery</div>

    <div class="search-container">
        <i class="fa fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search..." onkeyup="searchProducts()">
    </div>

    <div class="profile" onclick="toggleProfile(event)">
        <div id="profileIcon">👤</div>
    </div>
</div>

<!-- PROFILE MENU -->
<div class="profile-menu" id="profileMenu">
    <div class="profile-header">
        <div class="big-icon" id="bigIcon">👤</div>
        <h3 id="profileName">User</h3>
    </div>

    <div class="profile-options">
        <p onclick="goSignup()">Signup</p>
        <p onclick="goLogin()">Login</p>
        <p onclick="logout()">Logout</p>
    </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="icon" onclick="location.href='index.html'" data-name="Home">
        <i class="fa-solid fa-house"></i>
    </div>

    <div class="icon" onclick="location.href='cart.html'" data-name="Cart">
        <i class="fa-solid fa-cart-shopping"></i>
    </div>

    <div class="icon" onclick="location.href='orders.html'" data-name="Orders">
        <i class="fa-solid fa-box"></i>
    </div>

    <div class="icon" onclick="location.href='categories.html'" data-name="Categories">
        <i class="fa-solid fa-layer-group"></i>
    </div>
</div>

<!-- MAIN -->
<div class="main">
    <h1>Welcome to Turbo Grocery ⚡</h1>
    <p>Fast delivery. Smart shopping.</p>

    <div class="products" id="productContainer"></div>
</div>

<!-- POPUP -->
<div class="popup" id="productPopup">
    <div class="popup-content">
        <span class="close" onclick="closePopup()">&times;</span>

        <img id="popupImg">
        <h2 id="popupName"></h2>
        <p id="popupDesc"></p>
        <h3 id="popupPrice"></h3>

        <div class="popup-buttons">
            <button class="buy" onclick="buyNow()">Buy Now</button>
            <button class="cart" id="cartBtn" onclick="addToCart()">Add to Cart</button>
        </div>
    </div>
</div>

<script src="products.js"></script>
<script src="script.js"></script>

</body>
</html>
