<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Orders - Turbo Grocery</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- NAVBAR -->
<div class="topnav">
    <div class="logo">⚡🛒 Turbo Grocery</div>

    <div class="search-container">
        <i class="fa fa-search"></i>
        <input type="text" placeholder="Search groceries...">
    </div>

    <div class="profile" onclick="toggleProfile(event)">
        <div id="profileIcon">👤</div>
    </div>
</div>

<!-- PROFILE MENU -->
<div class="profile-menu" id="profileMenu">
    <div class="profile-header">
        <div class="big-icon" id="bigIcon">👤</div>
        <h3 id="profileName">User</h3>
    </div>

    <div class="profile-options">
        <p onclick="goSignup()">Signup</p>
        <p onclick="goLogin()">Login</p>
        <p onclick="logout()">Logout</p>
    </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="icon" onclick="location.href='index.html'" data-name="Home">
        <i class="fa-solid fa-house"></i>
    </div>

    <div class="icon" onclick="location.href='cart.html'" data-name="Cart">
        <i class="fa-solid fa-cart-shopping"></i>
    </div>

    <div class="icon active" data-name="Orders">
        <i class="fa-solid fa-box"></i>
    </div>

    <div class="icon" onclick="location.href='categories.html'" data-name="Categories">
        i class="fa-solid fa-layer-group"></i>
    </div>
</div>

<!-- MAIN -->
<div class="main">
    <h1>Your Orders 📦</h1>
    <button class="clear-orders" onclick="clearOrders()">Clear All Orders</button>
    <div id="ordersContainer"></div>
</div>

<div id="toast"></div>

<script src="products.js"></script>
<script src="script.js"></script>

</body>
</html>
