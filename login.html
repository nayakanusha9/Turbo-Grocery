<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login - Turbo Grocery</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topnav">
    <div class="logo">⚡🛒 Turbo Grocery</div>
</div>

<div class="sidebar">
    <div class="icon" onclick="location.href='index.html'">
        <i class="fa-solid fa-house"></i>
    </div>
</div>

<div class="main">

    <div class="form-box">
        <h2>Login</h2>

        <input type="text" id="loginName" placeholder="Full Name">
        <input type="password" id="loginPassword" placeholder="Password">

        <button type="button" onclick="login()">Login</button>
        <button class="back" onclick="goBackHome()">Back</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
