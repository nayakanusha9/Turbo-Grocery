<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cart - Turbo Grocery</title>

<link rel="stylesheet" href="style.css">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- ================= NAVBAR ================= -->
<div class="topnav">

    <div class="logo">⚡🛒 Turbo Grocery</div>

    <!-- PROFILE -->
    <div class="profile" onclick="toggleProfile(event)">
        <div id="profileIcon">👤</div>
    </div>

</div>

<!-- ================= PROFILE MENU ================= -->
<div class="profile-menu" id="profileMenu">

    <div class="profile-header">
        <div class="big-icon" id="bigIcon">👤</div>
        <h3 id="profileName">User</h3>
    </div>

    <div class="profile-options">
        <p onclick="goSignup()">Signup</p>
        <p onclick="goLogin()">Login</p>
        <p onclick="logout()">Logout</p>
    </div>

</div>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">

    <div class="icon" onclick="location.href='index.html'" data-name="Home">
        <i class="fa-solid fa-house"></i>
    </div>

    <div class="icon" onclick="location.href='cart.html'" data-name="Cart">
        <i class="fa-solid fa-cart-shopping"></i>
    </div>

    <div class="icon" onclick="location.href='orders.html'" data-name="Orders">
        <i class="fa-solid fa-box"></i>
    </div>

    <div class="icon" onclick="location.href='categories.html'" data-name="Categories">
        <i class="fa-solid fa-layer-group"></i>
    </div>

</div>

<!-- ================= MAIN ================= -->
<div class="main">

    <h1>Your Cart 🛒</h1>

    <!-- CART ITEMS -->
    <div id="cartContainer"></div>

    <!-- TOTAL -->
    <h2 id="totalPrice">Total: ₹0</h2>

</div>

<!-- ================= TOAST ================= -->
<div id="toast"></div>

<!-- ================= SCRIPTS ================= -->
<script src="products.js"></script>
<script src="script.js"></script>

</body>
</html>
